<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lost and Found KLH</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>Lost and Found KLH</h1>
  
  <!-- Login check will be replaced server-side by Flask -->
  <div id="login-block"></div>
  <div id="user-block" style="display:none;">
    <h2>Post Lost Item</h2>
    <form id="postForm" method="post" action="/post-item" enctype="multipart/form-data">
      <input type="text" name="title" placeholder="Item name" required /><br/>
      <input type="text" name="description" placeholder="Where lost/found?" required /><br/>
      <input type="text" name="contact_info" placeholder="Contact info" required /><br/>
      <input type="file" name="image" /><br/>
      <button type="submit">Post</button>
    </form>

    <h2>Lost & Found Items</h2>
    <div id="items"></div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
